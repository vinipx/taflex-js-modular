name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------------------
  # Job: lint
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  # ---------------------------------------------------------------------------
  # Job: test
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm test

  # ---------------------------------------------------------------------------
  # Job: pages — build & deploy docs (only on main when docs/ changes)
  # ---------------------------------------------------------------------------
  pages:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check for docs changes
        id: docs-changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^docs/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.docs-changed.outputs.changed == 'true'
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build Docusaurus
        if: steps.docs-changed.outputs.changed == 'true'
        run: |
          cd docs
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        if: steps.docs-changed.outputs.changed == 'true'
        with:
          path: docs/build
      - name: Deploy to GitHub Pages
        if: steps.docs-changed.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

  # ---------------------------------------------------------------------------
  # Job: publish — runs only on version tags (e.g. v1.2.0)
  # ---------------------------------------------------------------------------
  publish:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://npm.pkg.github.com
          cache: npm
      - run: npm ci
      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Publish each package in dependency order (core first)
          for pkg in core web api mobile bdd database reporters contracts; do
            echo "Publishing @taflex/${pkg}..."
            cd packages/${pkg}
            npm publish
            cd ../..
          done
          echo "All packages published successfully."
